name: อัปเดตข่าวอัตโนมัติ

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# ยกเลิกการรันซ้อนกัน กันหลาย run แย่งกัน push พร้อมกัน
concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: ดึงโค้ดจาก repo
        uses: actions/checkout@v4

      - name: ติดตั้ง Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: รันสคริปต์ดึงข่าว
        run: python fetch_news.py

      - name: รันสคริปต์ดึงอัตราแลกเปลี่ยน
        run: python fetch_rates.py

      - name: Commit และ push ถ้ามีข้อมูลใหม่
        run: |
          git config user.name "news-bot"
          git config user.email "news-bot@users.noreply.github.com"

          # เก็บไฟล์ข้อมูลที่เพิ่งสร้างไว้ชั่วคราว
          cp news.json /tmp/news.json 2>/dev/null || true
          cp rates.json /tmp/rates.json 2>/dev/null || true

          # ดึงของล่าสุดจาก remote มาก่อนเสมอ (กัน push ชนกัน)
          git fetch origin main
          git reset --hard origin/main

          # เอาไฟล์ข้อมูลใหม่กลับมาเขียนทับ
          cp /tmp/news.json news.json 2>/dev/null || true
          cp /tmp/rates.json rates.json 2>/dev/null || true

          git add news.json rates.json
          if git diff --staged --quiet; then
            echo "ไม่มีข้อมูลใหม่ ข้ามการ commit"
          else
            git commit -m "อัปเดตข่าวและอัตราแลกเปลี่ยนอัตโนมัติ $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
