<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD DISPATCH — กระดานข่าวรอบโลก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Public+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c0e;
    --panel:#14171b;
    --row-alt:#0f1216;
    --line:#252a30;
    --amber:#f2a900;
    --teal:#16bfa8;
    --violet:#b892ff;
    --text:#eae7dd;
    --text-dim:#868d94;
    --text-faint:#565d63;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Public Sans', sans-serif;
    line-height:1.55;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  .disp{font-family:'Space Grotesk', sans-serif;}

  /* ===== HEADER ===== */
  header{
    border-bottom:1px solid var(--line);
    padding:26px 20px 20px;
    position:sticky; top:0; z-index:20;
    background:rgba(10,12,14,0.94);
    backdrop-filter:blur(6px);
  }
  .header-top{
    max-width:1100px; margin:0 auto;
    display:flex; justify-content:space-between; align-items:flex-end;
    flex-wrap:wrap; gap:14px;
  }
  .brand .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem; letter-spacing:0.25em; color:var(--amber);
    text-transform:uppercase;
  }
  .brand h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(1.7rem, 4vw, 2.5rem);
    font-weight:700;
    margin:6px 0 0;
    letter-spacing:0.01em;
  }
  .clock-wrap{
    display:flex; align-items:center; gap:10px;
  }
  .clock{
    display:flex; gap:3px;
  }
  .flap-digit{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    width:26px; height:34px;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:1.1rem; font-weight:600;
    color:var(--amber);
  }
  .clock-label{font-size:0.65rem; color:var(--text-dim); letter-spacing:0.1em; text-transform:uppercase;}

  .snapshot-note{
    max-width:1100px; margin:14px auto 0;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem; color:var(--text-faint);
    display:flex; align-items:center; gap:8px;
  }
  .dot{width:6px; height:6px; border-radius:50%; background:var(--teal); animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.25;}}

  /* ===== FILTER TABS ===== */
  .tabs{
    max-width:1100px; margin:18px auto 0;
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .tab{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--text-dim);
    background:transparent;
    border:1px solid var(--line);
    border-radius:3px;
    padding:7px 14px;
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .tab:hover{color:var(--text);}
  .tab.active{
    color:var(--bg);
    background:var(--amber);
    border-color:var(--amber);
  }

  /* ===== BOARD ===== */
  main{max-width:1100px; margin:0 auto; padding:26px 20px 70px;}
  .board{border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .row{
    display:grid;
    grid-template-columns:88px 150px 90px 1fr 130px;
    align-items:start;
    gap:16px;
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    cursor:pointer;
    transition:background 0.2s ease;
  }
  .row:nth-child(even){background:var(--row-alt);}
  .row:hover{background:#1a1e24;}
  .row:last-child{border-bottom:none;}
  .row.hidden{display:none;}
  .row.open{
    background:#1c2229;
    box-shadow:inset 3px 0 0 var(--amber);
    position:relative; z-index:1;
  }

  .col-time{font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color:var(--text-dim); padding-top:2px;}
  .col-region{font-size:0.85rem; color:var(--text-dim); padding-top:2px;}
  .col-region .flag{margin-right:6px;}
  .col-code{padding-top:2px;}
  .badge{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem; font-weight:600; letter-spacing:0.06em;
    padding:3px 8px; border-radius:2px;
    display:inline-block;
  }
  .badge.world{color:var(--amber); border:1px solid var(--amber); background:rgba(242,169,0,0.08);}
  .badge.economy{color:var(--teal); border:1px solid var(--teal); background:rgba(22,191,168,0.08);}
  .badge.tech{color:var(--violet); border:1px solid var(--violet); background:rgba(184,146,255,0.08);}

  .col-headline h3{
    font-family:'Space Grotesk', sans-serif;
    font-size:1rem; font-weight:600;
    margin:0; color:var(--text);
  }
  .detail{
    display:grid; grid-template-rows:0fr;
    transition:grid-template-rows 0.3s ease;
  }
  .row.open .detail{grid-template-rows:1fr;}
  .detail-inner{overflow:hidden;}
  .detail p{
    margin:10px 0 0; font-size:0.88rem; color:var(--text-dim);
    padding-top:10px; border-top:1px dashed var(--line);
  }
  .col-source{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem; color:var(--text-faint);
    text-align:right;
  }
  .col-source a{color:var(--text-dim); text-decoration:none; border-bottom:1px dotted var(--text-faint);}
  .col-source a:hover{color:var(--amber); border-color:var(--amber);}
  .toggle-hint{font-size:0.65rem; color:var(--text-faint); margin-top:4px; display:block;}

  @media (max-width:760px){
    .row{grid-template-columns:1fr; gap:6px;}
    .col-source{text-align:left;}
  }

  footer{
    text-align:center; padding:40px 20px 60px;
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color:var(--text-faint);
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="eyebrow">Global newsroom snapshot</div>
      <h1>WORLD DISPATCH</h1>
    </div>
    <div class="clock-wrap">
      <div>
        <div class="clock-label">เวลาท้องถิ่นของคุณ</div>
        <div class="clock" id="clock"></div>
      </div>
    </div>
  </div>
  <div class="snapshot-note"><span class="dot"></span> ข้อมูลข่าว ณ วันที่ 14 กรกฎาคม 2569 (ภาพรวมข่าวจริง ไม่ใช่ฟีดสด — ดูหมายเหตุด้านล่างสำหรับการต่อยอด)</div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">ทั้งหมด</button>
    <button class="tab" data-filter="world">โลก</button>
    <button class="tab" data-filter="economy">เศรษฐกิจ</button>
    <button class="tab" data-filter="tech">เทคโนโลยี</button>
  </div>
</header>

<main>
  <div class="board" id="board"></div>
</main>

<footer>
  WORLD DISPATCH — สรุปข่าวจากสำนักข่าวต้นทางหลายแห่ง เพื่อการอ้างอิงเบื้องต้น กรุณาอ่านฉบับเต็มจากลิงก์แหล่งข่าว
</footer>

/* ========================================================
   โหลดข่าวจาก news.json ซึ่งถูกอัปเดตอัตโนมัติทุกวันโดย
   GitHub Actions (ดู .github/workflows/update-news.yml และ
   fetch_news.py) — ถ้าโหลดไม่ได้ (เช่น เปิดไฟล์ตรงๆ ในเครื่อง
   โดยไม่ผ่านเว็บโฮสต์) จะใช้ข่าว snapshot ที่ฝังไว้ด้านบนแทน
   ======================================================== */
async function fetchLiveDispatches(){
  try{
    const res = await fetch('news.json', {cache: 'no-store'});
    if(!res.ok) throw new Error('news.json not found');
    const data = await res.json();
    if(Array.isArray(data.items) && data.items.length > 0){
      updateSnapshotNote(data.updated_at);
      return data.items;
    }
    throw new Error('news.json ว่างเปล่า');
  }catch(err){
    console.warn('โหลด news.json ไม่สำเร็จ ใช้ข้อมูล snapshot สำรองแทน:', err);
    return DISPATCHES;
  }
}

function updateSnapshotNote(isoDate){
  const note = document.querySelector('.snapshot-note');
  if(!note || !isoDate) return;
  const d = new Date(isoDate);
  const formatted = d.toLocaleString('th-TH', {dateStyle:'long', timeStyle:'short'});
  note.innerHTML = `<span class="dot"></span> อัปเดตข่าวล่าสุดโดยอัตโนมัติ: ${formatted}`;
}

const board = document.getElementById('board');
const tabs = document.querySelectorAll('.tab');
let currentFilter = 'all';

let renderedItems = [];

function renderBoard(items){
  renderedItems = items;
  board.innerHTML = '';
  items.forEach((d, i)=>{
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.category = d.category;
    row.dataset.idx = i; // ผูกแถวกับข้อมูลชิ้นนี้โดยตรง ป้องกันคลิกแล้วขึ้นรายละเอียดผิดข่าว
    const catLabel = d.category === 'world' ? 'โลก' : d.category === 'economy' ? 'เศรษฐกิจ' : 'เทคโนโลยี';
    row.innerHTML = `
      <div class="col-time mono">${d.time}</div>
      <div class="col-region"><span class="flag">${d.flag}</span>${d.region}</div>
      <div class="col-code"><span class="badge ${d.category}">${catLabel}</span></div>
      <div class="col-headline">
        <h3>${d.headline}</h3>
        <div class="detail"><div class="detail-inner"><p>${d.detail}</p></div></div>
        <span class="toggle-hint mono">แตะเพื่อดูรายละเอียด</span>
      </div>
      <div class="col-source">${d.source}<br><a href="${d.url}" target="_blank" rel="noopener">อ่านต้นฉบับ ↗</a></div>
    `;
    board.appendChild(row);
  });
}

// ใช้ event delegation ที่ระดับ board แทนการผูก listener ทีละแถว
// เพื่อให้คลิกแล้วตรงกับข่าวที่เห็นบนจอเสมอ ไม่ว่าจะกรองหมวดไว้หรือไม่
board.addEventListener('click', (e)=>{
  if(e.target.tagName === 'A') return;
  const row = e.target.closest('.row');
  if(!row) return;
  const idx = Number(row.dataset.idx);
  const wasOpen = row.classList.contains('open');
  // ปิดการ์ดอื่นที่เปิดค้างไว้ก่อน กันไม่ให้ซ้อนกันจนดูสับสน
  document.querySelectorAll('.row.open').forEach(r => r.classList.remove('open'));
  if(!wasOpen){
    row.classList.add('open');
    const hint = row.querySelector('.toggle-hint');
    if(hint) hint.textContent = 'แตะเพื่อย่อรายละเอียด';
  }
  document.querySelectorAll('.row:not(.open) .toggle-hint').forEach(h=>{
    h.textContent = 'แตะเพื่อดูรายละเอียด';
  });
});

function applyFilter(filter){
  currentFilter = filter;
  document.querySelectorAll('.row').forEach(row=>{
    row.classList.toggle('hidden', filter !== 'all' && row.dataset.category !== filter);
  });
  tabs.forEach(t=>t.classList.toggle('active', t.dataset.filter === filter));
}

tabs.forEach(tab=>{
  tab.addEventListener('click', ()=> applyFilter(tab.dataset.filter));
});

// live clock, split-flap style
function renderClock(){
  const clockEl = document.getElementById('clock');
  const now = new Date();
  const str = now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
  clockEl.innerHTML = str.split('').map(ch=>{
    if(ch === ':') return `<div class="flap-digit mono" style="border:none;background:none;color:var(--text-faint);width:8px;">:</div>`;
    return `<div class="flap-digit mono">${ch}</div>`;
  }).join('');
}
renderClock();
setInterval(renderClock, 1000);

// init
fetchLiveDispatches().then(items=>{
  renderBoard(items);
  applyFilter('all');
});
</script>
